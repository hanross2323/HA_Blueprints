blueprint:
  name: Persianas solares industrial estable (anti-flicker real)
  description: >
    Control de persianas con histéresis real (ON/OFF separado) y estado persistente.
    Evita oscilaciones cuando el sol está en el límite de una fachada.

  domain: automation

  input:

    sun_entity:
      name: Sol
      default: sun.sun
      selector:
        entity:
          domain: sun

    min_elevation:
      name: Elevación mínima
      default: 12
      selector:
        number:
          min: 0
          max: 90
          step: 1
          unit_of_measurement: "°"

    east_center:
      name: Centro azimut Este
      default: 90
      selector:
        number:
          min: 0
          max: 360
          step: 1

    east_on_offset:
      name: Histéresis ON Este (±)
      default: 25
      selector:
        number:
          min: 1
          max: 90
          step: 1

    east_off_offset:
      name: Histéresis OFF Este (±)
      default: 35
      selector:
        number:
          min: 1
          max: 120
          step: 1

    west_center:
      name: Centro azimut Oeste
      default: 270
      selector:
        number:
          min: 0
          max: 360
          step: 1

    west_on_offset:
      name: Histéresis ON Oeste (±)
      default: 25
      selector:
        number:
          min: 1
          max: 90
          step: 1

    west_off_offset:
      name: Histéresis OFF Oeste (±)
      default: 35
      selector:
        number:
          min: 1
          max: 120
          step: 1

    east_covers:
      name: Persianas Este
      selector:
        target:
          entity:
            domain: cover

    west_covers:
      name: Persianas Oeste
      selector:
        target:
          entity:
            domain: cover

    east_state:
      name: Helper estado Este (input_boolean)
      selector:
        entity:
          domain: input_boolean

    west_state:
      name: Helper estado Oeste (input_boolean)
      selector:
        entity:
          domain: input_boolean


trigger:
  - platform: state
    entity_id: !input sun_entity

  - platform: time_pattern
    minutes: "/5"


variables:

  sun: !input sun_entity

  east_state: !input east_state
  west_state: !input west_state

  az: "{{ state_attr(sun,'azimuth') | float(0) }}"
  el: "{{ state_attr(sun,'elevation') | float(0) }}"

  min_el: !input min_elevation

  east_center: !input east_center
  east_on: !input east_on_offset
  east_off: !input east_off_offset

  west_center: !input west_center
  west_on: !input west_on_offset
  west_off: !input west_off_offset

  #####################################################
  # ZONAS ESTE
  #####################################################

  east_on_min: "{{ east_center - east_on }}"
  east_on_max: "{{ east_center + east_on }}"

  east_off_min: "{{ east_center - east_off }}"
  east_off_max: "{{ east_center + east_off }}"

  east_in_on_zone: >
    {{ el > min_el and east_on_min <= az <= east_on_max }}

  east_in_off_zone: >
    {{ az < east_off_min or az > east_off_max }}


  #####################################################
  # ZONAS OESTE
  #####################################################

  west_on_min: "{{ west_center - west_on }}"
  west_on_max: "{{ west_center + west_on }}"

  west_off_min: "{{ west_center - west_off }}"
  west_off_max: "{{ west_center + west_off }}"

  west_in_on_zone: >
    {{ el > min_el and west_on_min <= az <= west_on_max }}

  west_in_off_zone: >
    {{ az < west_off_min or az > west_off_max }}


action:

  - choose:

      #####################################################
      # EAST ON
      #####################################################

      - conditions:
          - condition: template
            value_template: >
              {{ east_in_on_zone and states(east_state) == 'off' }}

        sequence:

          - service: input_boolean.turn_on
            target:
              entity_id: !input east_state

          - service: input_boolean.turn_off
            target:
              entity_id: !input west_state

          - service: cover.set_cover_position
            target: !input east_covers
            data:
              position: 0


      #####################################################
      # EAST OFF
      #####################################################

      - conditions:
          - condition: template
            value_template: >
              {{ east_in_off_zone and states(east_state) == 'on' }}

        sequence:

          - service: input_boolean.turn_off
            target:
              entity_id: !input east_state

          - service: cover.open_cover
            target: !input east_covers


      #####################################################
      # WEST ON
      #####################################################

      - conditions:
          - condition: template
            value_template: >
              {{ west_in_on_zone and states(west_state) == 'off' }}

        sequence:

          - service: input_boolean.turn_on
            target:
              entity_id: !input west_state

          - service: input_boolean.turn_off
            target:
              entity_id: !input east_state

          - service: cover.set_cover_position
            target: !input west_covers
            data:
              position: 0


      #####################################################
      # WEST OFF
      #####################################################

      - conditions:
          - condition: template
            value_template: >
              {{ west_in_off_zone and states(west_state) == 'on' }}

        sequence:

          - service: input_boolean.turn_off
            target:
              entity_id: !input west_state

          - service: cover.open_cover
            target: !input west_covers


mode: single
