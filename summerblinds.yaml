blueprint:
  name: Persianas según posición del sol (Este/Oeste)
  description: >
    Baja automáticamente las persianas orientadas al Este u Oeste cuando el
    sol incide sobre ellas y las vuelve a subir cuando deja de hacerlo.

  domain: automation

  input:

    sun_entity:
      name: Entidad Sol
      default: sun.sun
      selector:
        entity:
          domain: sun

    east_covers:
      name: Persianas Este
      selector:
        target:
          entity:
            domain: cover

    west_covers:
      name: Persianas Oeste
      selector:
        target:
          entity:
            domain: cover

    min_elevation:
      name: Elevación mínima
      default: 15
      selector:
        number:
          min: 0
          max: 90
          step: 1
          unit_of_measurement: "°"

    east_start:
      name: Azimut inicio Este
      default: 60
      selector:
        number:
          min: 0
          max: 360
          step: 1

    east_end:
      name: Azimut fin Este
      default: 150
      selector:
        number:
          min: 0
          max: 360
          step: 1

    west_start:
      name: Azimut inicio Oeste
      default: 210
      selector:
        number:
          min: 0
          max: 360
          step: 1

    west_end:
      name: Azimut fin Oeste
      default: 300
      selector:
        number:
          min: 0
          max: 360
          step: 1

trigger:

  - platform: state
    entity_id: !input sun_entity

  - platform: time_pattern
    minutes: "/5"

variables:

  sun_entity: !input sun_entity
  min_elevation: !input min_elevation

  east_start: !input east_start
  east_end: !input east_end

  west_start: !input west_start
  west_end: !input west_end

condition: []

action:

  - variables:

      azimuth: >
        {{ state_attr(sun_entity,'azimuth')|float }}

      elevation: >
        {{ state_attr(sun_entity,'elevation')|float }}

  - choose:

      ####################################################
      # ESTE
      ####################################################

      - conditions:
          - condition: template
            value_template: >
              {{
                elevation > min_elevation
                and
                east_start <= azimuth <= east_end
              }}

        sequence:

          - service: cover.close_cover
            target: !input east_covers

          - service: cover.open_cover
            target: !input west_covers

      ####################################################
      # OESTE
      ####################################################

      - conditions:
          - condition: template
            value_template: >
              {{
                elevation > min_elevation
                and
                west_start <= azimuth <= west_end
              }}

        sequence:

          - service: cover.close_cover
            target: !input west_covers

          - service: cover.open_cover
            target: !input east_covers

    default:

      - service: cover.open_cover
        target: !input east_covers

      - service: cover.open_cover
        target: !input west_covers

mode: single
